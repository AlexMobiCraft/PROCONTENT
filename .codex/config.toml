approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.yolo]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"
